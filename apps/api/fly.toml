# Fly.io deploy config for the apps/api orchestrator (NestJS WebSocket + PTY).
#
# This is the stateful, long-running orchestrator target. It runs the SAME
# NestJS WS+PTY process as the docker-compose target (apps/api/Dockerfile),
# and mounts a persistent Fly volume at /data so that
# workspaces/<id>/session.log survives a machine restart and the reconnect
# snapshot + tail-replay still works (design D5/D10).
#
# CONTROL PLANE ONLY — Fly is NOT a per-task execution target. Per-task
# execution uses Docker-out-of-Docker (DooD) to provision sibling AIO sandbox
# containers, which requires a host docker socket. Fly runs Firecracker
# microVMs that expose NO host docker socket, so DooD sibling provisioning is
# impossible here. The orchestrator MAY still run the control plane on Fly, but
# task execution requires the docker-compose self-host topology
# (docker-compose.yml). Both targets keep running the SAME NestJS orchestrator.
#
# The web target (Vercel) reaches this api exclusively over the cross-origin
# API_BASE_URL / WS_URL; CORS / WS-origin allow-listing is wired in the
# integration track. WebSockets require a single long-lived machine, so
# auto_stop_machines is disabled and a minimum of one machine is kept running.

app = "cap-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Orchestrator writes each task's session.log under here; this path lives on
  # the mounted persistent volume below.
  WORKSPACES_DIR = "/data/workspaces"

# Persistent volume backing workspaces/<id>/session.log across restarts.
[mounts]
  source = "cap_api_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine alive: a WS+PTY orchestrator cannot be cold-started per
  # request without dropping live terminal sockets.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  method = "GET"
  path = "/health"
  interval = "15s"
  timeout = "5s"
  grace_period = "20s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
