# docker-compose deploy target for the apps/api orchestrator.
#
# Runs the SAME NestJS WebSocket + PTY orchestrator as the Fly.io target
# (apps/api/Dockerfile / apps/api/fly.toml), alongside the Postgres database
# the orchestrator's Prisma layer needs.
#
# The named volume `workspaces` is mounted at the orchestrator's WORKSPACES_DIR
# so that workspaces/<id>/session.log survives an orchestrator restart and the
# reconnect snapshot + tail-replay still works (design D5/D10, multi-target
# "session.log survives an orchestrator restart" scenario).
#
# == Per-task execution topology (DooD self-host; design D) ==
#
# This compose self-host topology is the ONLY per-task EXECUTION target. The
# orchestrator provisions one sibling AIO Sandbox container per task via
# Docker-out-of-Docker (DooD): it dockerode-creates `cap-aio-<taskId>` from the
# pinned derived AIO image and dials it BY CONTAINER NAME over the user-defined
# `cap-net` network. Per-task sandboxes attach to `cap-net`, are reachable only
# by the orchestrator on that network, and publish NO host port — so NETWORK
# ISOLATION is the execution security boundary (AIO's HTTP/WS API is open by
# default; the private network is what confines it).
#
# SECURITY (single-user self-host ONLY): mounting /var/run/docker.sock into the
# `api` service grants the orchestrator container HOST-ROOT-EQUIVALENT access to
# the Docker daemon (it can create/stop any container and bind-mount any host
# path). This is ACCEPTED, not mitigated, and is sound ONLY for a single-user
# self-host deployment. Do NOT use this topology for multi-tenant / multi-user
# hosting. Fly.io is NOT an execution target: its Firecracker microVMs expose no
# host docker socket, so DooD sibling provisioning is impossible there (the
# orchestrator MAY still run the control plane on Fly — see apps/api/fly.toml).

# structured-logging: bound every long-lived container's json-file logs so the
# stdout stream rotates with a hard disk ceiling (~100MB/container) instead of
# growing unbounded — the latent disk-fill the unconfigured driver risked, and
# the cause of the ddba "logs vanished" loss. Referenced via the *default-logging
# anchor on each service below.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  api:
    build:
      # Build from the repo root so the monorepo Dockerfile can copy the
      # workspace (packages/contracts + apps/api).
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    # DooD needs access to the mounted /var/run/docker.sock. The api image runs as
    # a non-root user (correct for the Fly.io control-plane deploy, which does NOT
    # mount the socket), but the host docker.sock is root-owned, so under the
    # compose self-host topology the orchestrator must run as root to use it (6.6 —
    # a DooD `docker` call from `api` succeeds with no EACCES). This is consistent
    # with the already-accepted "docker.sock = host-root-equivalent, single-user
    # self-host ONLY" threat model documented in the header above.
    user: root
    depends_on:
      postgres:
        condition: service_healthy
    # Backend secrets/config (legacy AUTH_TOKEN, OAuth client, SESSION_SECRET,
    # CODEX_CRED_ENC_KEY, AUTH_ALLOWLIST, WEB_ORIGIN, metrics) come from this
    # gitignored env file so the committed compose carries NO secrets. Copy
    # apps/api/.env.example to apps/api/.env and fill it for a self-host deploy.
    # required:false so `docker compose config`/CI parses without the local file.
    env_file:
      - path: apps/api/.env
        required: false
      # Dokploy self-host deploy target: secrets are provided as a Dokploy
      # "file mount" written to <appName>/files/api.env, a SIBLING of the
      # cloned code dir — hence ../files relative to this compose file. The
      # path does not exist for local dev / CI / other targets, so it is
      # required:false there, exactly like the apps/api/.env entry above.
      - path: ../files/api.env
        required: false
    environment:
      PORT: "8080"
      # session.log lives under here, on the persistent named volume below.
      WORKSPACES_DIR: /data/workspaces
      # Env-overridable so a self-hoster can point at an EXTERNAL Postgres (or
      # different credentials); leaving it unset uses the compose-internal
      # `postgres` service default below (design D2 — no maintainer-hardcoded DB).
      DATABASE_URL: ${DATABASE_URL:-postgresql://cap:cap@postgres:5432/cap?schema=public}
      # AUTH_TOKEN (legacy break-glass) + the OAuth/session/Codex-key config now
      # come from the env_file above (apps/api/.env). Declaring AUTH_TOKEN here as
      # ${AUTH_TOKEN} would override the env_file with an empty shell value, so it
      # is intentionally NOT redeclared in this environment block.
      #
      # CLAUDE_CODE_OAUTH_TOKEN (add-claude-code-runtime): the long-lived token a
      # `claude-code` task's `claude` CLI uses inside the sandbox. It is a SECRET,
      # so it flows in via the env_file above (apps/api/.env) exactly like
      # AUTH_TOKEN — and is deliberately NOT redeclared here as
      # ${CLAUDE_CODE_OAUTH_TOKEN}, which would clobber the env_file value with an
      # empty shell value when the var is unset in the host shell. Unset → the
      # Claude runtime reports not-ready and the codex path is unaffected. Mint it
      # on a workstation with `claude setup-token` (see .env.example).
      # Pinned derived AIO sandbox image the provider provisions per task
      # (cap-aio-<taskId>). MUST be a pinned tag, NEVER :latest (design D —
      # reproducible, version-pinned execution image). Override via .env.
      AIO_SANDBOX_IMAGE: ${AIO_SANDBOX_IMAGE:-cap-aio-sandbox:pinned}
      # Concurrency ceiling + per-task clone URL, passed through under the EXACT
      # names the orchestrator process reads (deploy-config 4.1):
      #   MAX_CONCURRENT_TASKS -> apps/api/src/guardrails/guardrails.module.ts
      #                           (process.env.MAX_CONCURRENT_TASKS -> semaphore cap)
      #   TASK_REPO_URL        -> apps/api/src/sandbox/aio-sandbox.provider.ts
      #                           (process.env.TASK_REPO_URL -> per-task clone URL)
      # The code already reads these; compose previously did not pass them through.
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-}
      # OPEN QUESTION (deploy-config follow-up): a single GLOBAL compose env is the
      # WRONG model for TASK_REPO_URL's per-task semantics. Every task provisioned
      # by this orchestrator would clone the SAME repo, but the real intent is one
      # source repo PER task. This global passthrough is a stopgap so the existing
      # provider code path is exercised; it is NOT the intended per-task design.
      # The per-task source-of-record (e.g. carried on the task record / create
      # request and threaded into the provider's ProvisionContext, with per-task
      # credential sourcing) is UNRESOLVED and deferred to the integration track.
      # Do NOT mistake this global env for the final per-task design.
      TASK_REPO_URL: ${TASK_REPO_URL:-}
    ports:
      - "8080:8080"
    networks:
      # Join the compose `default` network to reach Postgres. Postgres stays on
      # `default` ONLY (it does NOT join cap-net), so per-task sandboxes — which
      # live on cap-net — cannot reach the database. The orchestrator bridges the
      # two networks (6.5 — `api` reaches Postgres AND a cap-net sandbox, no
      # P1001). NOTE: a service that declares `networks:` no longer joins
      # `default` implicitly, so it must be listed explicitly here.
      - default
      # AND join the user-defined cap-net so the orchestrator can dial per-task
      # sandbox containers BY NAME (cap-aio-<taskId>). The default bridge has
      # no container-name DNS, so cap-net is required for connect-in addressing.
      - cap-net
    volumes:
      # Persistent named volume backing workspaces/<id>/session.log so it
      # survives `docker compose restart api` / a container recreate (4.2).
      - workspaces:/data/workspaces
      # Docker-out-of-Docker: mount the host docker socket so the orchestrator
      # can provision SIBLING AIO sandbox containers (design D). HOST-ROOT-
      # EQUIVALENT — accepted for single-user self-host only (see header).
      - /var/run/docker.sock:/var/run/docker.sock

  # ── Self-contained web console (design D1) ─────────────────────────────────
  # The Nitro `node-server` build of apps/web, run as a long-lived Node process
  # (`node .output/server/index.mjs`) so `docker compose up` yields a COMPLETE
  # cap a stranger can use WITHOUT a separate Vercel deploy. It runs NO WebSocket
  # server of its own: the live PTY rides the api's `/terminal` WS, which the
  # browser dials directly via the build-time-baked VITE_WS_URL.
  #
  # VITE_API_BASE_URL / VITE_WS_URL are BUILD-TIME values: Vite inlines them into
  # the client bundle, so they are passed as build `args` (baked into this
  # domain-specific image), NOT runtime env. Set them to YOUR api's public
  # origin/ws url before `docker compose up --build`. PORT is the only runtime
  # value (the Node server's listen port); publish it on the host (default 3000).
  web:
    # OPT-IN via the `web` profile (mirrors observability/grafana/proxy). A
    # self-hoster enables the full in-compose frontend with `COMPOSE_PROFILES=web`
    # (or `--profile web`); a maintainer deploy that serves the web console
    # elsewhere (e.g. Vercel) leaves the profile off and this service is neither
    # built nor run. Phase 1 (unified release-gated deploy) flips this default-on
    # once everyone consumes the published cap-web image.
    profiles: ["web"]
    build:
      # apps/web/Dockerfile builds with NITRO_PRESET=node-server (the Vercel
      # path stays selectable via that build arg — design D1).
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - api
    environment:
      PORT: "3000"
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    networks:
      # The default network is enough — the web server only needs to be reachable
      # by the browser (host-published) and does NOT dial per-task sandboxes, so
      # it stays OFF cap-net.
      - default

  # ── OPT-IN reverse proxy for the VPS deploy (Cloudflare -> nginx -> api) ────
  # Gated behind the `proxy` profile so a plain `docker compose up` (local dev,
  # which hits the api directly on :8080) does NOT start nginx. Enable on the VPS
  # only: `docker compose --profile proxy up -d --build`.
  #
  # Cloudflare (orange-cloud, TLS to the browser) connects to this proxy, which
  # forwards X-Forwarded-Proto: https so the api emits SameSite=None+Secure
  # session cookies and https redirects (see deploy/nginx/nginx.conf), and which
  # proxies the /terminal WebSocket upgrade for the live PTY. The api stays on the
  # `default` network so nginx reaches it by service name `api:8080`.
  nginx:
    image: nginx:1.27-alpine
    profiles: ["proxy"]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - api
    ports:
      - "80:80"
      # Uncomment for the Cloudflare "Full (strict)" origin-cert path, together
      # with the :443 server block + cert mount below.
      # - "443:443"
    volumes:
      # The reverse-proxy config, read-only.
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Optional Cloudflare Origin Certificate dir (origin.pem / origin.key),
      # read-only. Only needed if you uncomment the :443 server block + publish.
      # - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      # Join `default` to reach the api by service name (api:8080). nginx does
      # NOT need cap-net (that is only for orchestrator -> per-task sandbox DNS).
      - default

  # ── Build-only vehicle for the per-task AIO sandbox image ──────────────────
  # The orchestrator dockerode-provisions one cap-aio-<taskId> container per
  # task from the pinned derived image (AIO_SANDBOX_IMAGE, defaulted to
  # cap-aio-sandbox:pinned above). That image is NOT a compose runtime service,
  # so without this entry nothing in the deploy pipeline would ever rebuild it.
  # This service exists purely so `docker compose up -d --build` (the deploy
  # command) rebuilds + retags the pinned image from the in-repo Dockerfile on
  # every deploy — docker/aio-sandbox.Dockerfile changes ship with the same
  # push that ships orchestrator changes (build args stay pinned by the
  # Dockerfile ARG defaults; see deploy/DEPLOY.md §3).
  #
  # It is deliberately NOT a runtime container: the entrypoint override exits
  # immediately (the AIO base entrypoint would otherwise start a full sandbox
  # server), restart "no" keeps it down, and network_mode none keeps it off
  # cap-net/default. Running per-task sandboxes keep their already-created
  # image; only NEWLY provisioned tasks pick up the rebuilt tag.
  aio-sandbox-image:
    build:
      context: .
      dockerfile: docker/aio-sandbox.Dockerfile
    image: cap-aio-sandbox:pinned
    entrypoint: ["true"]
    restart: "no"
    network_mode: none

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: cap
      POSTGRES_PASSWORD: cap
      POSTGRES_DB: cap
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cap -d cap"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Observability stack (observability-stack) — OPT-IN via profiles ─────────
  # Tier 1 (storage+collection): `--profile observability` → loki + grafana-alloy
  # Tier 2 (UI):                 `--profile grafana`       → grafana
  # Disabling an upper tier never breaks a lower one; with NO profile, none start
  # and the api still logs to stdout (structured-logging Tier 0 floor).

  loki:
    image: grafana/loki:3.1.1
    profiles: ["observability"]
    restart: unless-stopped
    logging: *default-logging
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./deploy/observability/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    # Private network only — NO published port (reachable by alloy/grafana by name).
    networks:
      - default
    mem_limit: 256m

  grafana-alloy:
    image: grafana/alloy:v1.3.1
    profiles: ["observability"]
    restart: unless-stopped
    logging: *default-logging
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--storage.path=/var/lib/alloy/data"
    depends_on:
      - loki
    volumes:
      - ./deploy/observability/alloy-config.alloy:/etc/alloy/config.alloy:ro
      # READ-ONLY docker logs (design D1 — NO docker.sock).
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - alloy-data:/var/lib/alloy/data
    networks:
      - default
    mem_limit: 128m

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["grafana"]
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - loki
    environment:
      # Read-only Postgres datasource creds (see deploy/observability/grafana-ro-role.sql).
      GRAFANA_PG_USER: ${GRAFANA_PG_USER:-grafana_ro}
      GRAFANA_PG_PASSWORD: ${GRAFANA_PG_PASSWORD:-}
      # NOT publicly exposed — served ONLY behind the authenticated Cloudflare
      # tunnel (nginx route). Lock down anonymous + sign-up.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-}
      # Strong admin password (required before public exposure); set in Dokploy env.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    # Published to LOOPBACK only (127.0.0.1) so the host-network cloudflared tunnel
    # can reach it as http://localhost:3001 while it stays OFF the public IP. Public
    # access is ONLY via your own authenticated Cloudflare tunnel ingress.
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - default
    mem_limit: 256m

networks:
  # User-defined bridge network with container-name DNS. The `api` service
  # joins it, and each per-task AIO sandbox (cap-aio-<taskId>) is attached to it
  # at provision time so the orchestrator can dial sandboxes by container name.
  # Sandboxes publish no host port; reachability is confined to this network —
  # network isolation is the execution security boundary (design D).
  cap-net:
    name: cap-net

volumes:
  # Named volume so session.log persists across orchestrator restarts.
  workspaces:
  pgdata:
  # Observability stack state (observability-stack); only used when the
  # observability/grafana profiles are enabled.
  loki-data:
  alloy-data:
  grafana-data:
