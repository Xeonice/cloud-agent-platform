# =============================================================================
# nginx reverse proxy for the cloud-agent-platform `api` orchestrator (VPS deploy).
#
# Topology:  browser --HTTPS--> Cloudflare --HTTP(or HTTPS)--> nginx:80(/443) --> api:8080
#
# This config runs ONLY on the VPS, behind Cloudflare, and is OPT-IN via the
# docker-compose `proxy` profile (`docker compose --profile proxy up`). Local
# dev hits the api directly on :8080 and never starts this proxy.
#
# Why each piece exists (do NOT remove without understanding the consequence):
#   * X-Forwarded-Proto: the api's isSecureRequest() (github-oauth.controller.ts)
#     reads X-Forwarded-Proto FIRST to decide SameSite=None+Secure on the OAuth
#     session cookie and to build the https redirect scheme. The browser<->Cloudflare
#     leg is ALWAYS HTTPS, so we forward https. We honor an incoming value from
#     Cloudflare when present and default to https otherwise (see the $fwd_proto map).
#   * WebSocket upgrade: the live terminal is a NestJS WS gateway at path /terminal
#     (@WebSocketGateway({ path: '/terminal' })). Proxying the Upgrade/Connection
#     headers + a long read timeout keeps the long-lived PTY socket alive.
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── WebSocket upgrade plumbing ───────────────────────────────────────────
    # Standard map: when the client sends `Upgrade: websocket`, emit
    # `Connection: upgrade`; otherwise emit `Connection: close`. Required for the
    # /terminal PTY WS to be proxied (proxy_http_version 1.1 + these headers).
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── X-Forwarded-Proto passthrough ────────────────────────────────────────
    # Cloudflare terminates TLS to the browser and sets X-Forwarded-Proto. We
    # honor that value when present; if it is absent (e.g. a direct origin probe)
    # we default to https, because the user-facing leg is always HTTPS at
    # Cloudflare. This is what makes the api emit Secure cookies + https redirects.
    map $http_x_forwarded_proto $fwd_proto {
        default $http_x_forwarded_proto;
        ''      https;
    }

    # Cloudflare can stream large PTY frames / clone output; don't buffer responses
    # so terminal output is delivered promptly.
    proxy_buffering off;
    proxy_request_buffering off;

    # Generous body size for any upload-ish API calls; tune as needed.
    client_max_body_size 50m;

    # Reusable upstream: the api service on the compose `default` network.
    upstream cap_api {
        server api:8080;
        keepalive 32;
    }

    # Shared proxy header block, included by both the :80 and (optional) :443
    # server blocks below. Kept inline (not an include file) so the mounted
    # config is a single self-contained file.
    # NOTE: nginx has no "macro"; the directives are repeated in each server.

    # =========================================================================
    # HTTP :80 — the active path. Cloudflare (orange-cloud) connects here for
    # SSL/TLS mode "Flexible", OR redirects/originates here for "Full" if you do
    # not enable the :443 origin-cert block below.
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        # Catch-all: the real domain is enforced at Cloudflare, so any Host is fine.
        server_name _;

        # Cheap origin health probe that does not touch the api.
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Sandbox callbacks are private cap-net traffic and must never traverse
        # the public reverse proxy, even if the upstream route is auth-exempt.
        location = /internal/sandbox/approvals {
            access_log off;
            return 404;
        }

        location / {
            proxy_pass http://cap_api;

            # HTTP/1.1 + upgrade headers are REQUIRED for the /terminal WebSocket.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Preserve the client-facing host + real client IP chain.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # CRUCIAL: drives Secure/SameSite=None cookie + https redirect scheme.
            proxy_set_header X-Forwarded-Proto $fwd_proto;
            proxy_set_header X-Forwarded-Host $host;

            # Long-lived PTY sockets: keep the terminal WS open for up to 1h idle.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            # Allow time for the OAuth code<->token exchange + slow upstream starts.
            proxy_connect_timeout 60s;
        }
    }

    # =========================================================================
    # OPTIONAL HTTPS :443 — Cloudflare "Full (strict)" with a Cloudflare Origin
    # Certificate. Uncomment this block AND uncomment the `443:443` publish +
    # the cert volume mount in docker-compose.yml's nginx service.
    #
    # Generate the origin cert in the Cloudflare dashboard
    # (SSL/TLS -> Origin Server -> Create Certificate), then place:
    #   deploy/nginx/certs/origin.pem   (certificate)
    #   deploy/nginx/certs/origin.key   (private key)
    # which are mounted read-only at /etc/nginx/certs inside the container.
    # =========================================================================
    # server {
    #     listen 443 ssl;
    #     listen [::]:443 ssl;
    #     http2 on;
    #     server_name _;
    #
    #     ssl_certificate     /etc/nginx/certs/origin.pem;
    #     ssl_certificate_key /etc/nginx/certs/origin.key;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location = /healthz {
    #         access_log off;
    #         return 200 "ok\n";
    #         add_header Content-Type text/plain;
    #     }
    #
    #     # Keep the private sandbox callback off the public HTTPS origin too.
    #     location = /internal/sandbox/approvals {
    #         access_log off;
    #         return 404;
    #     }
    #
    #     location / {
    #         proxy_pass http://cap_api;
    #
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection $connection_upgrade;
    #
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $fwd_proto;
    #         proxy_set_header X-Forwarded-Host $host;
    #
    #         proxy_read_timeout 3600s;
    #         proxy_send_timeout 3600s;
    #         proxy_connect_timeout 60s;
    #     }
    # }
}
