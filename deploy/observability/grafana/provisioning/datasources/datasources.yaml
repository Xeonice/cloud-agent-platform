# Grafana datasource provisioning (observability-stack Tier 2).
#
# Two sources in one pane (design D3):
#   - Loki      — LogQL over the operational logs (primary ops/debug entry).
#   - Postgres  — the existing audit_events, queried IN PLACE via a READ-ONLY
#                 role. Audit is NOT copied into Loki; it stays the single source
#                 of truth + permanent append-only.
apiVersion: 1

datasources:
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false

  - name: Postgres-Audit
    uid: postgres-audit
    type: postgres
    access: proxy
    url: postgres:5432
    database: cap
    # Read-only role created by grafana-ro-role.sql; credentials via Grafana env.
    user: ${GRAFANA_PG_USER}
    secureJsonData:
      password: ${GRAFANA_PG_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      # Defensive: the role is SELECT-only, but disallow non-SELECT from the UI too.
      timescaledb: false
    editable: false
