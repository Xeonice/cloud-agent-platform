# SELF-CONTAINED, SOURCE-FREE RUN compose — the dedicated "run" unit, split from
# build (OSS self-update epic, decision ④/⑤).
#
# BUILD lives elsewhere: docker-compose.yml + .github/workflows/release.yml build
# and push the GHCR images on the build platform. This file ONLY RUNS the prebuilt,
# version-pinned images — it has NO `build:` blocks and NO bind-mounts to the
# source tree, so a runner needs JUST this file + a `.env` (NO `git clone`):
#
#   1. download docker-compose.prod.yml + docker-compose.prod.env.example from a Release
#   2. cp docker-compose.prod.env.example .env   # then fill it in
#   3. docker compose -f docker-compose.prod.yml pull
#   4. docker compose -f docker-compose.prod.yml up -d
#
# CAP_VERSION defaults to `latest` (the newest published Release) when unset, so a
# bare `docker compose -f docker-compose.prod.yml up -d` just runs the latest release
# as a resident stack. PIN an explicit tag (e.g. CAP_VERSION=v0.1.0) for a reproducible
# / rollback-able deploy. All three cap images share ONE tag so the set stays matched (⑤).
#
# REQUIRES AN amd64 / x86_64 HOST. The published images are amd64-only because the
# per-task AIO sandbox base image (ghcr.io/agent-infra/sandbox) is amd64-only — cap
# is an amd64 platform. On an arm64 host (e.g. Apple Silicon) the pull fails with
# "no matching manifest for linux/arm64"; use an x86_64 host (or amd64 emulation).
#
# SCOPE: this is the CORE run unit — api + the per-task sandbox image + Postgres,
# plus the optional in-compose web console (`web` profile). The reverse proxy and
# the observability stack are NOT here on purpose: they bind-mount config from the
# source tree (nginx.conf, loki/alloy/grafana configs), which would break the
# source-free promise. Front the api with your own TLS/reverse-proxy (Cloudflare
# Tunnel, Caddy, Traefik, nginx…); run observability from the full source compose
# if you want it. See deploy/DEPLOY.md.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "5"

services:
  api:
    image: ghcr.io/xeonice/cap-api:${CAP_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    # DooD: host-root-equivalent docker.sock access (single-user self-host only).
    # root so the root-owned socket is readable.
    user: root
    depends_on:
      postgres:
        condition: service_healthy
    # Secrets/config come from a `.env` you create NEXT TO this file (source-free:
    # NOT from the repo tree). `../files/api.env` is also honored for Dokploy's
    # file-mount layout. Both optional so `docker compose config` parses without them.
    env_file:
      - path: .env
        required: false
      - path: ../files/api.env
        required: false
    environment:
      PORT: "8080"
      WORKSPACES_DIR: /data/workspaces
      DATABASE_URL: ${DATABASE_URL:-postgresql://cap:cap@postgres:5432/cap?schema=public}
      # The pulled, version-matched per-task sandbox image (decision ⑤): newly
      # provisioned cap-aio-<taskId> run the SAME release as the api. Pinned tag.
      AIO_SANDBOX_IMAGE: ghcr.io/xeonice/cap-aio-sandbox:${CAP_VERSION:-latest}
      # The single user-facing version, reported by GET /version on this image.
      CAP_VERSION: ${CAP_VERSION:-latest}
      MAX_CONCURRENT_TASKS: ${MAX_CONCURRENT_TASKS:-}
      TASK_REPO_URL: ${TASK_REPO_URL:-}
    ports:
      - "8080:8080"
    networks:
      - default
      - cap-net
    volumes:
      - workspaces:/data/workspaces
      - /var/run/docker.sock:/var/run/docker.sock

  # OPTIONAL in-compose web console (`web` profile). CAVEAT: the prebuilt cap-web
  # image bakes VITE_API_BASE_URL/VITE_WS_URL AT BUILD time, and the release builds
  # it with the defaults (localhost) — so this prebuilt image is only correct for a
  # SAME-HOST / localhost console. For a custom domain, serve the console elsewhere
  # (e.g. Vercel) pointed at your api, or rebuild cap-web with your own VITE_* from
  # source. (A runtime-config web is future work — see docs/oss-self-update-epic.md.)
  web:
    profiles: ["web"]
    image: ghcr.io/xeonice/cap-web:${CAP_VERSION:-latest}
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - api
    environment:
      PORT: "3000"
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    networks:
      - default

  # PULL vehicle for the per-task AIO sandbox image: pinning its `image:` to the
  # release tag makes `docker compose -f docker-compose.prod.yml pull` fetch
  # cap-aio-sandbox:${CAP_VERSION} onto the host so the DooD provider (pointed at
  # it via AIO_SANDBOX_IMAGE above) finds it. Non-runtime: it never starts.
  aio-sandbox-image:
    image: ghcr.io/xeonice/cap-aio-sandbox:${CAP_VERSION:-latest}
    entrypoint: ["true"]
    restart: "no"
    network_mode: none

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cap}
      POSTGRES_DB: ${POSTGRES_DB:-cap}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cap} -d ${POSTGRES_DB:-cap}"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  cap-net:
    name: cap-net

volumes:
  workspaces:
  pgdata:
