# Release pipeline — versioned-release-pipeline, Track release-ci.
#
# Builds and pushes the MATCHED, version-pinned image set
#   ghcr.io/xeonice/cap-api
#   ghcr.io/xeonice/cap-web
#   ghcr.io/xeonice/cap-aio-sandbox
#   ghcr.io/xeonice/cap-boxlite-sandbox
# ALL first published with the SINGLE release version (`github.event.release.tag_name`,
# e.g. vX.Y.Z). Only after all four version tags exist does one promotion gate
# move every `latest` tag to that release, so `latest` never advances merely
# because the API or one matrix member happened to finish first. One Release is
# therefore one mutually-compatible set
# (design D2 / decision ⑤). Each image is injected with the version build-args
# (`CAP_VERSION`/`GIT_SHA`/`BUILD_TIME`) so the published api self-reports via
# `GET /version` and the web bundle bakes its build id (`VITE_BUILD_ID`). The
# cap-aio-sandbox image's coupled triplet (AIO base tag + codex + openspec) is
# surfaced as overridable build-args here but DEFAULTS to the pinned values in
# docker/aio-sandbox.Dockerfile (never `:latest`).
#
# INERT UNTIL A RELEASE IS CUT (design D3): the only triggers are
# `release: published` and the manual `workflow_dispatch`. Merely committing or
# pushing this file builds and pushes NOTHING — a normal push to any branch does
# not match either trigger. The first real publish happens when the operator
# publishes a GitHub Release.

name: release

on:
  # Publishing a GitHub Release `vX.Y.Z` is the ONLY automatic trigger. A plain
  # push never matches, so committing this workflow is inert.
  release:
    types: [published]
  # Manual re-run (e.g. to re-push a set or build off a chosen tag). The version
  # is taken from the `version` input here, since there is no release payload.
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build and push (e.g. v1.2.3)."
        required: true
        type: string

# Least-privilege: write to GHCR (packages) only; read the repo to build.
permissions:
  contents: read
  packages: write

env:
  CODEX_VERSION: "0.144.1"
  CLAUDE_CODE_VERSION: "2.1.207"
  OPENSPEC_VERSION: "1.4.1"

jobs:
  # Gate: the source-free run package's INLINE observability configs must match their
  # canonical source (deploy/observability/*) and be `$`-escaped, so a Release never ships a
  # stale or interpolation-broken docker-compose.prod.yml. Generated by
  # gen-prod-observability-configs.mjs; this fails the release on drift (release-and-versioning).
  verify-run-package:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify inline observability configs are in sync and escaped
        run: node deploy/observability/gen-prod-observability-configs.mjs --check

  # Resolve one release identity once so every image receives the exact same
  # version, build timestamp, and GIT_SHA. The API image gate, the remaining
  # image matrix, AND the task-model attestation all consume these immutable
  # outputs rather than resolving independently — the single source of truth
  # that guards against SHA-context drift between the image build-arg and the
  # attested buildIdentity (automate-task-model-attestation-in-ci, design D1).
  resolve-release:
    needs: verify-run-package
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_time: ${{ steps.version.outputs.build_time }}
      git_sha: ${{ steps.version.outputs.git_sha }}
    steps:
      - name: Resolve release version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="${RELEASE_TAG:-$INPUT_VERSION}"
          if [ -z "$VERSION" ]; then
            echo "No version available (no release tag and no workflow_dispatch input)." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "git_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  # Build the production API artifact into the local Docker image store, prove
  # both its packaged Git executable and its real startup preflight, and only
  # then authenticate and push those exact local tags. No other image job can
  # begin pushing until this job has passed.
  build-smoke-push-api:
    needs: resolve-release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local cap-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ghcr.io/xeonice/cap-api:${{ needs.resolve-release.outputs.version }}
          build-args: |
            CAP_VERSION=${{ needs.resolve-release.outputs.version }}
            GIT_SHA=${{ needs.resolve-release.outputs.git_sha }}
            BUILD_TIME=${{ needs.resolve-release.outputs.build_time }}
            CODEX_VERSION=${{ env.CODEX_VERSION }}
            CLAUDE_CODE_VERSION=${{ env.CLAUDE_CODE_VERSION }}
            OPENSPEC_VERSION=${{ env.OPENSPEC_VERSION }}

      - name: Smoke built cap-api image
        run: |
          node scripts/cap-api-image-smoke.mjs \
            --image "ghcr.io/xeonice/cap-api:${{ needs.resolve-release.outputs.version }}" \
            --pull never \
            --negative-fixture

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push verified cap-api version image
        run: docker push "ghcr.io/xeonice/cap-api:${{ needs.resolve-release.outputs.version }}"

      - name: Set cap-api package visibility public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/cap-api/visibility" \
            -f visibility=public

  build-push:
    needs: [resolve-release, build-smoke-push-api]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      # Build every image even if one fails, so a partial failure is visible
      # per-image rather than masking the rest.
      fail-fast: false
      matrix:
        include:
          - name: cap-web
            dockerfile: apps/web/Dockerfile
            platforms: linux/amd64
          - name: cap-aio-sandbox
            dockerfile: docker/aio-sandbox.Dockerfile
            platforms: linux/amd64
          - name: cap-boxlite-sandbox
            dockerfile: docker/boxlite-sandbox.Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          # Build from the repo root so each monorepo Dockerfile can COPY the
          # workspace (packages/contracts + the app), matching docker-compose.yml.
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ghcr.io/xeonice/${{ matrix.name }}:${{ needs.resolve-release.outputs.version }}
          # Version build-args injected into EVERY image so the published api
          # self-reports via /version and the web bundle bakes its build id.
          # VITE_BUILD_ID is consumed by apps/web/Dockerfile; the api/sandbox
          # Dockerfiles consume CAP_VERSION/GIT_SHA/BUILD_TIME. Build-args a
          # given Dockerfile does not declare are simply ignored, so the same
          # block is safe across release images. The cap-aio-sandbox triplet
          # (AIO base tag + codex + openspec) is left to the pinned defaults in
          # docker/aio-sandbox.Dockerfile (never overridden to :latest here).
          build-args: |
            CAP_VERSION=${{ needs.resolve-release.outputs.version }}
            GIT_SHA=${{ needs.resolve-release.outputs.git_sha }}
            BUILD_TIME=${{ needs.resolve-release.outputs.build_time }}
            VITE_BUILD_ID=${{ needs.resolve-release.outputs.version }}
            CODEX_VERSION=${{ env.CODEX_VERSION }}
            CLAUDE_CODE_VERSION=${{ env.CLAUDE_CODE_VERSION }}
            OPENSPEC_VERSION=${{ env.OPENSPEC_VERSION }}

      # Make the published package publicly pullable so self-hosters
      # `docker pull` without auth (design D3 / decision: GHCR packages public).
      # The package exists only after the push above. This is best-effort: on a
      # brand-new package the owner may still need the one-time GHCR UI setting
      # documented in deploy/DEPLOY.md, hence continue-on-error.
      - name: Set ${{ matrix.name }} package visibility public
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/${{ matrix.name }}/visibility" \
            -f visibility=public

  # Every immutable version image must be present before any moving tag advances.
  # `imagetools create` promotes the registry manifest itself instead of pulling,
  # retagging, and pushing one host platform; this preserves BoxLite's amd64/arm64
  # manifest list as well as the single-platform manifests of the other images.
  promote-latest:
    needs: [resolve-release, build-smoke-push-api, build-push]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify the complete immutable image set
        env:
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          for image in cap-api cap-web cap-aio-sandbox cap-boxlite-sandbox; do
            docker buildx imagetools inspect "ghcr.io/xeonice/${image}:${RELEASE_VERSION}"
          done

      - name: Promote the complete image set to latest
        env:
          RELEASE_VERSION: ${{ needs.resolve-release.outputs.version }}
        run: |
          for image in cap-api cap-web cap-aio-sandbox cap-boxlite-sandbox; do
            docker buildx imagetools create \
              --tag "ghcr.io/xeonice/${image}:latest" \
              "ghcr.io/xeonice/${image}:${RELEASE_VERSION}"
          done

  # Attach the SOURCE-FREE run package to the Release so anyone can run cap from
  # prebuilt images WITHOUT cloning: download these two files, fill .env, and
  # `docker compose -f docker-compose.prod.yml up -d` (release-and-versioning,
  # decision ④/⑤ — build/run split). Only on a real Release (not workflow_dispatch).
  #
  # This job ALSO generates and attaches the build-matched task-model attestation
  # asset (automate-task-model-attestation-in-ci): it runs after promote-latest,
  # so the image identity is final, and it derives the attested buildIdentity
  # from the SAME resolve-release `git_sha` output that was passed as the
  # cap-api GIT_SHA build-arg — never a separately-resolved SHA context.
  # `compatibilityChecksPassed` is attested only after the release commit's
  # "task model N-1 compatibility" check-run is verified successful via the
  # check-runs API (honesty split, design D1) — never assumed from workflow
  # adjacency.
  attach-run-assets:
    needs: [verify-run-package, resolve-release, promote-latest]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      checks: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Fail the attestation path closed unless the release commit's N-1
      # compatibility check-run ACTUALLY concluded successfully. release.yml
      # triggers on release:published while the compat job lives in ci.yml on
      # the merged commit, so adjacency proves nothing — query the evidence.
      - name: Verify task model N-1 compatibility check-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_GIT_SHA: ${{ needs.resolve-release.outputs.git_sha }}
        run: |
          result="$(gh api -X GET \
            "repos/${{ github.repository }}/commits/${RELEASE_GIT_SHA}/check-runs" \
            -f check_name='task model N-1 compatibility' \
            --jq '[.check_runs[]] | sort_by(.id) | last | if . == null then "absent" else "\(.status):\(.conclusion)" end')" || {
            echo "error: could not query check-runs for ${RELEASE_GIT_SHA} — refusing to attest compatibilityChecksPassed" >&2
            exit 1
          }
          echo "task model N-1 compatibility check-run for ${RELEASE_GIT_SHA}: ${result}"
          if [ "$result" != "completed:success" ]; then
            echo "error: the release commit's 'task model N-1 compatibility' check-run is ${result} — refusing to attest compatibilityChecksPassed" >&2
            exit 1
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # The generator validates its output against the UNCHANGED contracts
      # attestation schema, which it loads from the built dist output.
      - name: Build contracts schema for attestation validation
        run: pnpm --filter @cap/contracts build

      - name: Generate task model attestation asset
        env:
          RELEASE_GIT_SHA: ${{ needs.resolve-release.outputs.git_sha }}
        run: |
          node scripts/generate-task-model-attestation.mjs \
            --version "${{ github.event.release.tag_name }}" \
            --git-sha "${RELEASE_GIT_SHA}" \
            --compat-verified true \
            --out dist/task-model-attestation

      # SHA-context drift guard: the attested buildIdentity must equal the
      # GIT_SHA build-arg baked into the released cap-api image (both come from
      # resolve-release, and this assertion keeps that invariant from silently
      # regressing if either side is ever rewired).
      - name: Assert attested buildIdentity matches the api image GIT_SHA build-arg
        env:
          RELEASE_GIT_SHA: ${{ needs.resolve-release.outputs.git_sha }}
        run: |
          asset="dist/task-model-attestation/cap-task-model-attestation-${{ github.event.release.tag_name }}.json"
          jq -e --arg sha "$RELEASE_GIT_SHA" \
            '(.reports | length) == 4 and ([.reports[].buildIdentity] | all(. == $sha))' \
            "$asset" >/dev/null || {
            echo "error: attested buildIdentity drifted from the cap-api GIT_SHA build-arg (${RELEASE_GIT_SHA})" >&2
            exit 1
          }

      - name: Attach source-free run package and task-model attestation to the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            docker-compose.prod.yml docker-compose.prod.env.example \
            dist/task-model-attestation/* \
            --clobber --repo "${{ github.repository }}"

  attach-sandbox-image-assets:
    needs: promote-latest
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install image asset tools
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo zstd
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Package sandbox image Release assets
        run: |
          node scripts/release-image-assets.mjs package \
            --version "${{ github.event.release.tag_name }}" \
            --owner xeonice \
            --out dist/release-image-assets \
            --cleanup-images
      - name: Attach sandbox image assets to the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/release-image-assets/* \
            --clobber --repo "${{ github.repository }}"
