name: CI

# Strict typecheck + lint + unit-test gate (add-ci-typecheck-gate +
# guard-runtime-selection-regression). The release/build workflows only transpile
# (Docker/vite), so strict `tsc` errors could land on main undetected; this enforces
# the monorepo-foundation `turbo typecheck lint build` contract on changes, AND now
# runs the API and Web unit suites so behavioral regressions (for example runtime
# selection or schedule-history rendering) fail CI instead of shipping silently.
#
# boot-smoke gate (api-key-machine-identity, design D6 / monorepo-foundation spec
# "CI boots the built application and probes liveness", gap G5): a SEPARATE job
# boots the BUILT app against a throwaway Postgres and probes `/health`, so a
# cross-provider DI / onApplicationBootstrap ordering break — the failure class
# that build + unit tests provably MISS (it manifests only at DI-graph
# instantiation) and that caused a multi-hour production outage — fails CI here
# instead of in production. It runs independently of typecheck+lint (its own job)
# and MUST be made a required status check BEFORE the epic introduces a new module.
on:
  pull_request:
  push:
    branches: [main]

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only reads the repo.
permissions:
  contents: read

jobs:
  # Stable merge-gating context for the shared Public V1/MCP contract. Branch
  # protection must require the exact context `public-surface-parity` after this
  # job has reported once; hooks and CI intentionally call the same root command.
  public-surface-parity:
    name: public-surface-parity
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout complete comparison history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify Public V1/MCP parity
        env:
          # PRs compare the complete base branch; pushes compare the full event
          # range. The runner fails closed if this explicit base is unavailable.
          CAP_PUBLIC_SURFACE_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm verify:public-surface

  task-model-n-minus-one-compat:
    name: task model N-1 compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate current Prisma client
        run: pnpm --filter @cap/api prisma:generate

      - name: Exercise pinned N-1 REST and MCP writers
        env:
          TASK_MODEL_N_MINUS_ONE_EVIDENCE: ${{ runner.temp }}/task-model-n-minus-one/evidence.json
        run: pnpm --filter @cap/api test:compat:task-model-n-minus-one

      - name: Upload sanitized N-1 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task-model-n-minus-one-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/task-model-n-minus-one/evidence.json
          if-no-files-found: ignore
          retention-days: 7

  typecheck-lint:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # `turbo build` first: it generates the codegen prerequisites that `turbo
      # typecheck` needs but does NOT itself depend on — the @cap/web route tree
      # (TanStack Start vite plugin), the @cap/api Prisma client (its build script),
      # and the @cap/contracts / @cap/ui dist types. Two separate invocations
      # guarantee every build (hence every generated input) is done before any
      # typecheck runs.
      - name: Build (codegen prerequisites)
        run: pnpm turbo build

      - name: Typecheck + lint (strict)
        run: pnpm turbo typecheck lint

      # Run the @cap/api unit suite (node:test over the compiled dist spec files).
      # Invoked directly via pnpm (NOT `turbo test`): the package's `pretest` already
      # runs `turbo run build --filter=@cap/api`, so a `turbo test` task would nest
      # turbo inside turbo and trip turbo 2.x's recursive-invocation guard. The build
      # above makes the pretest build a cache hit. This is the lane the runtime-
      # selection regression spec (and the rest of the api specs) gate in.
      - name: Test (api unit suite)
        run: pnpm --filter @cap/api test

      # Shared contracts contain production-schema boundary and cross-surface
      # parity fixtures. Run them explicitly; API/Web suites do not discover
      # package-local `.test.mjs` files.
      - name: Test (shared contracts)
        run: pnpm --filter @cap/contracts test

      # Vitest is a separate package script rather than a turbo task. Keep it in
      # the required lane so console behavior cannot pass locally but skip CI.
      - name: Test (web unit suite)
        run: pnpm --filter @cap/web test

      # These release/install contract suites live at the repository root rather
      # than inside a workspace package. Keep them in the required lane: the
      # Release-asset packager and its quick-deploy consumer must change together.
      - name: Test (release and install contracts)
        run: |
          bash -n scripts/release.sh scripts/quick-deploy.sh scripts/scheduled-tasks-live-e2e.sh
          node scripts/release-image-assets.test.mjs
          node scripts/release-tail.test.mjs
          node scripts/quick-deploy-preflight.test.mjs
          node scripts/docker-compose.deploy-config.test.mjs
          node --test scripts/scheduled-tasks-live-e2e.test.mjs

  # Boots the BUILT @cap/api orchestrator against a throwaway Postgres and probes
  # the unauthenticated `/health` liveness endpoint, failing the pipeline on any
  # bootstrap / DI error. A SEPARATE job (runs independently of typecheck+lint) so
  # this guard is unaffected by — and not blocked behind — the lint gate.
  #
  # add-private-account-identity (task 10.3): the smoke ALSO exercises the
  # default-admin SEED + ARGON2 path. `scripts/boot-smoke.sh` boots with
  # `ADMIN_EMAIL` set (so the `AdminSeedService` boot hook actually runs and
  # argon2-hashes a generated password) and then probes the one-time
  # `POST /auth/admin/reveal`; a missing/incompatible `@node-rs/argon2` native
  # binary or a broken seed fails CI here, not in production. No extra step is
  # needed — the script self-provides a throwaway `ADMIN_EMAIL` default.
  #
  # REQUIRED STATUS CHECK (task 1.2): this job's `name:` ("boot-smoke") is the
  # status-check CONTEXT to add to the `main` branch-protection rule alongside the
  # existing "typecheck + lint" context, so a red boot-smoke BLOCKS merge. GitHub
  # only lets a context be marked required AFTER it has reported once, so this must
  # be done after the workflow first runs on a PR. Add it with (run once landed):
  #   gh api -X PATCH repos/<owner>/<repo>/branches/main/protection/required_status_checks \
  #     -f 'contexts[]=typecheck + lint' -f 'contexts[]=boot-smoke'
  # This MUST be in place before the epic introduces a new application module
  # (api-key-machine-identity Track 5), the failure class this gate guards.
  boot-smoke:
    name: boot-smoke
    runs-on: ubuntu-latest

    # Throwaway Postgres the orchestrator's Prisma layer connects to at boot. A
    # service container is the disposable DB the spec calls for; it is wiped with
    # the runner, never persisted.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cap
          POSTGRES_PASSWORD: cap
          POSTGRES_DB: cap
        ports:
          - 5432:5432
        # Gate the steps below until Postgres is accepting connections, so
        # `prisma migrate deploy` never races the DB coming up.
        options: >-
          --health-cmd "pg_isready -U cap -d cap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # Point Prisma at the service container (mapped to localhost on the runner).
      DATABASE_URL: postgresql://cap:cap@localhost:5432/cap?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Build the api (and its workspace deps): produces apps/api/dist/main.js and
      # generates the Prisma client the boot needs. This is the SAME built artifact
      # the container CMD runs, so a DI break surfaces here exactly as in prod.
      - name: Build (@cap/api + deps)
        run: pnpm turbo build --filter=@cap/api

      # Prove predecessor rows survive the additive model-selection migration,
      # then reset the throwaway schema for the ordinary boot smoke below.
      - name: Task model migration compatibility
        env:
          CAP_TASK_MODEL_MIGRATION_TEST: "1"
        run: pnpm --filter @cap/api test:migration:model

      # Migrate the throwaway DB, boot the built app, probe /health. The helper
      # exits non-zero (and dumps the app log) on any migration / bootstrap / DI /
      # liveness failure — the signal this job gates on.
      - name: Boot smoke (/health)
        run: bash scripts/boot-smoke.sh

      # Real Postgres + the actual polling timer. This guards the manual-dispatch
      # and future-fire interaction that service fakes alone cannot prove.
      - name: Scheduled tasks integration
        run: pnpm test:integration:schedules

      # Real AppModule + Postgres contract parity across Console REST, Public V1,
      # MCP structured tools and schedule create/update/fire/recovery. External
      # catalog/provision boundaries are deterministic; every application-owned
      # controller, service and database write/read path remains production code.
      - name: Task model cross-surface integration
        run: pnpm test:integration:task-model-surfaces

  # Full owner-authenticated schedule story. Unlike the fast Postgres integration
  # above, this boots the real AppModule and console, drives them through a browser,
  # and proves the real poller reaches TasksService, Guardrails, audit recording,
  # and the sandbox-provider port. The runner allocates all ports dynamically and
  # owns its uniquely named disposable Postgres container.
  scheduled-tasks-e2e:
    name: scheduled tasks browser e2e
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm --filter @cap/web exec playwright install --with-deps chromium

      - name: Scheduled tasks live E2E
        timeout-minutes: 10
        env:
          SCHEDULE_E2E_ARTIFACT_DIR: ${{ runner.temp }}/scheduled-tasks-e2e
        run: pnpm test:e2e:schedules:local

      - name: Sanitize scheduled-task E2E evidence
        if: always()
        env:
          SCHEDULE_E2E_ARTIFACT_ROOT: ${{ runner.temp }}/scheduled-tasks-e2e
        run: |
          if [[ -d "$SCHEDULE_E2E_ARTIFACT_ROOT" ]]; then
            if ! node scripts/sanitize-scheduled-tasks-e2e-artifacts.mjs "$SCHEDULE_E2E_ARTIFACT_ROOT"; then
              rm -rf -- "$SCHEDULE_E2E_ARTIFACT_ROOT"
              exit 1
            fi
          fi

      - name: Upload scheduled-task evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-tasks-e2e-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/scheduled-tasks-e2e
          if-no-files-found: ignore
          retention-days: 7
