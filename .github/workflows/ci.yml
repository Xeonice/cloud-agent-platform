name: CI

# Strict typecheck + lint gate (add-ci-typecheck-gate). The release/build workflows
# only transpile (Docker/vite), so strict `tsc` errors could land on main undetected;
# this enforces the monorepo-foundation `turbo typecheck lint build` contract on changes.
on:
  pull_request:
  push:
    branches: [main]

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only reads the repo.
permissions:
  contents: read

jobs:
  typecheck-lint:
    name: typecheck + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # `turbo build` first: it generates the codegen prerequisites that `turbo
      # typecheck` needs but does NOT itself depend on — the @cap/web route tree
      # (TanStack Start vite plugin), the @cap/api Prisma client (its build script),
      # and the @cap/contracts / @cap/ui dist types. Two separate invocations
      # guarantee every build (hence every generated input) is done before any
      # typecheck runs.
      - name: Build (codegen prerequisites)
        run: pnpm turbo build

      - name: Typecheck + lint (strict)
        run: pnpm turbo typecheck lint
