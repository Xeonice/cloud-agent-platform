name: CI

# Strict typecheck + lint + unit-test gate (add-ci-typecheck-gate +
# guard-runtime-selection-regression). The release/build workflows only transpile
# (Docker/vite), so strict `tsc` errors could land on main undetected; this enforces
# the monorepo-foundation `turbo typecheck lint build` contract on changes, AND now
# runs the @cap/api unit suite so a behavioral regression (e.g. the v0.6.0 runtime-
# selection DOA, where claude-code tasks silently ran codex) fails CI instead of
# shipping silently.
on:
  pull_request:
  push:
    branches: [main]

# Supersede in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only reads the repo.
permissions:
  contents: read

jobs:
  typecheck-lint:
    name: typecheck + lint + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # `turbo build` first: it generates the codegen prerequisites that `turbo
      # typecheck` needs but does NOT itself depend on — the @cap/web route tree
      # (TanStack Start vite plugin), the @cap/api Prisma client (its build script),
      # and the @cap/contracts / @cap/ui dist types. Two separate invocations
      # guarantee every build (hence every generated input) is done before any
      # typecheck runs.
      - name: Build (codegen prerequisites)
        run: pnpm turbo build

      - name: Typecheck + lint (strict)
        run: pnpm turbo typecheck lint

      # Run the @cap/api unit suite (node:test over the compiled dist spec files).
      # Invoked directly via pnpm (NOT `turbo test`): the package's `pretest` already
      # runs `turbo run build --filter=@cap/api`, so a `turbo test` task would nest
      # turbo inside turbo and trip turbo 2.x's recursive-invocation guard. The build
      # above makes the pretest build a cache hit. This is the lane the runtime-
      # selection regression spec (and the rest of the api specs) gate in.
      - name: Test (api unit suite)
        run: pnpm --filter @cap/api test
